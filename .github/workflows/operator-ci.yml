# Migrated from Jenkins job: Platform/Operator/operator-ci
# Original: Builds and tests the Go Kubernetes operator. Uses shared library goCI step.

name: Operator CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Poll every 5 minutes (H/5 * * * * in Jenkins cron)
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.22'

      - name: Run tests
        run: make test

      - name: Build
        run: make build
